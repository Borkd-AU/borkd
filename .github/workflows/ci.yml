name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  check:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo check

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

  migration-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # commit message inspection for destructive override

      - name: Idempotency ŌĆö CREATE TABLE must use IF NOT EXISTS
        run: |
          # supabase/migrations/_CONVENTIONS.md ┬¦2 requires every
          # CREATE TABLE to be re-runnable. Catch the common miss.
          #
          # ERE has no negative lookahead, so we list all CREATE TABLE
          # matches and filter those that DON'T contain "IF NOT EXISTS".
          matches=$(grep -rnE '^\s*CREATE\s+TABLE\s+' supabase/migrations/*.sql 2>/dev/null || true)
          bad=$(echo "$matches" | grep -viE 'CREATE\s+TABLE\s+IF\s+NOT\s+EXISTS' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-idempotent CREATE TABLE. Use 'CREATE TABLE IF NOT EXISTS'."
            echo "$bad"
            exit 1
          fi

      - name: Idempotency ŌĆö ADD COLUMN must use IF NOT EXISTS
        run: |
          matches=$(grep -rnE '^\s*ALTER\s+TABLE\s+.*ADD\s+COLUMN\s+' supabase/migrations/*.sql 2>/dev/null || true)
          # Tolerate two forms: "ADD COLUMN IF NOT EXISTS" and multi-column
          # ADD within a single ALTER (checked line-by-line).
          bad=$(echo "$matches" | grep -viE 'ADD\s+COLUMN\s+IF\s+NOT\s+EXISTS' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-idempotent ADD COLUMN. Use 'ADD COLUMN IF NOT EXISTS'."
            echo "$bad"
            exit 1
          fi

      - name: Idempotency ŌĆö CREATE INDEX must use IF NOT EXISTS
        run: |
          matches=$(grep -rnE '^\s*CREATE\s+(UNIQUE\s+)?INDEX\s+' supabase/migrations/*.sql 2>/dev/null || true)
          bad=$(echo "$matches" | grep -viE 'CREATE\s+(UNIQUE\s+)?INDEX\s+IF\s+NOT\s+EXISTS' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-idempotent CREATE INDEX. Use 'CREATE INDEX IF NOT EXISTS'."
            echo "$bad"
            exit 1
          fi

      - name: Destructive ops require commit-message override
        run: |
          # Rule: DROP COLUMN / DROP TABLE / ALTER ... RENAME in any
          # migration file on this PR means the most recent commit body
          # must contain the literal tag [allow-destructive-migration].
          # This forces the 2-PR discipline from _CONVENTIONS.md ┬¦3.
          destructive=$(grep -rniE '(DROP\s+COLUMN|DROP\s+TABLE|ALTER\s+.*RENAME)' supabase/migrations/*.sql 2>/dev/null || true)
          if [ -n "$destructive" ]; then
            if ! git log -1 --format='%B' | grep -q '\[allow-destructive-migration\]'; then
              echo "::error::Destructive migration found but commit message lacks [allow-destructive-migration] marker."
              echo "$destructive"
              echo "::error::Follow docs/_CONVENTIONS.md ┬¦3 (2-PR procedure) and add the marker to the commit body."
              exit 1
            fi
            echo "::notice::Destructive migration permitted by [allow-destructive-migration] marker."
          fi

      - name: Rollback sibling present for schema-changing migrations
        run: |
          # Every forward migration that touches schema (CREATE TABLE,
          # ADD COLUMN NOT NULL, DROP *, CREATE INDEX on existing table)
          # must ship a sibling `_rollback.sql`.
          set -euo pipefail
          missing=""
          for m in supabase/migrations/[0-9]*.sql; do
            [ -e "$m" ] || continue
            case "$m" in
              *_rollback.sql) continue ;;
            esac
            if grep -qiE 'CREATE\s+TABLE|ADD\s+COLUMN.*NOT\s+NULL|DROP\s+(COLUMN|TABLE)|CREATE\s+(UNIQUE\s+)?INDEX' "$m"; then
              sibling="${m%.sql}_rollback.sql"
              if [ ! -f "$sibling" ]; then
                missing+="  $m -> expected $sibling"$'\n'
              fi
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Schema-changing migration missing rollback sibling:"
            echo "$missing"
            exit 1
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Match ACTUAL secret values, not the word "service_role" on its own
          # (Supabase's public role name ŌĆö appears in comments, RLS policies,
          # migration files, and docs legitimately). A real leak looks like an
          # assignment or an embedded JWT, so we require one of:
          #   * Stripe/GitHub/AWS/Google/Slack prefixes ŌĆö cannot be anything else
          #   * JWT shape + "service_role" literal inside the encoded payload
          #   * `service_role(_key)?\s*[:=]\s*["']?[A-Za-z0-9._-]{20,}`
          #   * PEM private key header
          PATTERNS='(sk_live_|sk_test_|pk_live_|pk_test_|AKIA[0-9A-Z]{16}|aws_secret_access_key\s*[:=]|AIza[0-9A-Za-z_-]{35}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_|xox[bporas]-|eyJhbGciOi[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+\.[A-Za-z0-9_.+/=-]{20,}|service_role[_a-z]*\s*[:=]\s*["'"'"']?[A-Za-z0-9._-]{20,}|-----BEGIN.*PRIVATE KEY-----)'
          if grep -rE "$PATTERNS" \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' \
            --exclude='package.json' --exclude='package-lock.json' --exclude='pnpm-lock.yaml' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.turbo .; then
            echo "::error::Secret patterns detected in source code!"
            exit 1
          fi

      - name: Check for .env files committed
        run: |
          if git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$|\.env\.development$'; then
            echo "::error::.env files should not be committed!"
            exit 1
          fi

      - name: Check for hardcoded database URLs with credentials
        run: |
          if grep -rE 'postgres(ql)?://[^:]+:[^@]+@|mysql://[^:]+:[^@]+@|mongodb(\+srv)?://[^:]+:[^@]+@' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::Database URL with embedded credentials detected!"
            exit 1
          fi

      - name: Check RLS on new migrations
        run: |
          # RLS is enforced across the whole migration chain, not per file ŌĆö
          # tables are often created in an early migration and have RLS
          # enabled in a later one (the old per-file check broke the moment
          # we introduced 00001_create_users + 00005_create_rls_policies).
          #
          # Rule: for every `CREATE TABLE public.<name>` anywhere in
          # supabase/migrations/**, some migration must contain
          # `ALTER TABLE public.<name> ENABLE ROW LEVEL SECURITY`.
          # Skip the spatial_ref_sys / tiger / topology schemas that PostGIS
          # ships (we don't own those tables).
          set -euo pipefail

          CREATED=$(grep -rihoE 'CREATE\s+TABLE\s+(IF\s+NOT\s+EXISTS\s+)?public\.[a-zA-Z_][a-zA-Z0-9_]*' supabase/migrations/ \
            | grep -oE 'public\.[a-zA-Z_][a-zA-Z0-9_]*' \
            | sort -u)

          ENABLED=$(grep -rihoE 'ALTER\s+TABLE\s+(ONLY\s+)?public\.[a-zA-Z_][a-zA-Z0-9_]*\s+ENABLE\s+ROW\s+LEVEL\s+SECURITY' supabase/migrations/ \
            | grep -oE 'public\.[a-zA-Z_][a-zA-Z0-9_]*' \
            | sort -u)

          MISSING=$(comm -23 <(echo "$CREATED") <(echo "$ENABLED") || true)

          if [ -n "${MISSING:-}" ]; then
            echo "::error::Tables created without RLS enabled anywhere in migrations:"
            echo "$MISSING"
            exit 1
          fi

          echo "RLS enabled on all $(echo "$CREATED" | wc -l | tr -d ' ') public tables."

      - name: Check architecture violations
        run: |
          # apps/mobile cannot import from apps/admin
          if grep -rE "from ['\"].*apps/admin" apps/mobile/ --include='*.ts' --include='*.tsx' 2>/dev/null; then
            echo "::error::apps/mobile imports from apps/admin (forbidden)"
            exit 1
          fi
          # apps/admin cannot import from apps/mobile
          if grep -rE "from ['\"].*apps/mobile" apps/admin/ --include='*.ts' --include='*.tsx' 2>/dev/null; then
            echo "::error::apps/admin imports from apps/mobile (forbidden)"
            exit 1
          fi
          # packages/shared cannot import from apps/
          if grep -rE "from ['\"].*apps/" packages/shared/ --include='*.ts' --include='*.tsx' 2>/dev/null; then
            echo "::error::packages/shared imports from apps/ (forbidden)"
            exit 1
          fi

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

  eas-preview:
    name: EAS Build (Preview)
    needs: [check, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview
        run: cd apps/mobile && eas build --platform all --profile preview --non-interactive

  eas-staging:
    name: EAS Build (Staging)
    needs: [check, security-scan]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build staging
        run: cd apps/mobile && eas build --platform all --profile staging --non-interactive

  eas-production:
    name: EAS Build (Production)
    needs: [check, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build production
        run: cd apps/mobile && eas build --platform all --profile production --non-interactive

  deploy-admin-preview:
    name: Deploy Admin (Preview)
    needs: [check, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm turbo build --filter=@borkd/admin

      # TODO: Add Vercel/Netlify preview deployment step

  deploy-admin-production:
    name: Deploy Admin (Production)
    needs: [check, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from `packageManager` in root package.json.
      # Do NOT pass `version` here ŌĆö action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION when both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm turbo build --filter=@borkd/admin

      # TODO: Add Vercel/Netlify production deployment step

  supabase-migrations:
    name: Supabase Migrations
    needs: [check, security-scan]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
